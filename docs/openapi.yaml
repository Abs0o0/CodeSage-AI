openapi: 3.0.3
info:
  title: CodeSage API
  version: 1.0.0
  description: |
    Backend API documentation for CodeSage.
    - Bearer token is required for protected routes.
    - Refresh/logout use the refresh cookie set by the backend.

servers:
  - url: http://localhost:5001
    description: Local development server

tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Reviews
  - name: Content

paths:
  /:
    get:
      tags: [Health]
      summary: Root endpoint
      responses:
        "200":
          description: API is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            example:
              username: Ramouzaa
              email: Ramouzaaa@example.com
              password: "12345678"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: Ramouzaa@example.com
              password: "12345678"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using refresh cookie
      description: Uses the refresh token cookie sent by the browser. No request body.
      responses:
        "200":
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "401":
          description: Refresh token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout user
      description: Revokes the refresh cookie token and clears the cookie. No request body.
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      tags: [Users]
      summary: Update current user profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
            example:
              username: Ramouzaa2
              email: Ramouzaa2@example.com
              fullName: Ramouzaa Samy
              jobTitle: Frontend Developer
      responses:
        "200":
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserUpdateResponse"
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me/password:
    patch:
      tags: [Users]
      summary: Change current user password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
            example:
              currentPassword: oldpass123
              newPassword: newpass123
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid password input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me/deactivate:
    patch:
      tags: [Users]
      summary: Deactivate current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deactivated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/users/me/avatar:
    post:
      tags: [Users]
      summary: Upload current user avatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AvatarUploadRequest"
      responses:
        "200":
          description: Avatar uploaded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserUpdateResponse"
        "400":
          description: Invalid file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/reviews/analyze:
    post:
      tags: [Reviews]
      summary: Analyze code with AI
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
            example:
              code: "const x = 1;"
              language: JavaScript
              file: snippet.js
      responses:
        "200":
          description: Review result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Missing code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/reviews/fix:
    post:
      tags: [Reviews]
      summary: Generate fixed code
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixRequest"
            example:
              code: "const x = 1;"
              language: JavaScript
      responses:
        "200":
          description: Fixed code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixResponse"
        "400":
          description: Missing code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/reviews/history:
    get:
      tags: [Reviews]
      summary: Get current user review history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Review history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewHistoryItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/features:
    get:
      tags: [Content]
      summary: Get landing page features
      responses:
        "200":
          description: Features list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeatureItem"

  /api/languages:
    get:
      tags: [Content]
      summary: Get supported languages
      responses:
        "200":
          description: Languages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LanguageItem"

  /api/dashboard:
    get:
      tags: [Content]
      summary: Get dashboard data for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/history:
    get:
      tags: [Content]
      summary: Get current user history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: History list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReviewHistoryItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    HealthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        uptime:
          type: number
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        jobTitle:
          type: string
        avatarUrl:
          type: string
        active:
          type: boolean
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AuthSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RefreshResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    CurrentUserResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: "#/components/schemas/User"

    UserUpdateResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        fullName:
          type: string
        jobTitle:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    AvatarUploadRequest:
      type: object
      required: [avatar]
      properties:
        avatar:
          type: string
          format: binary

    AnalyzeRequest:
      type: object
      required: [code, language]
      properties:
        code:
          type: string
        language:
          type: string
        file:
          type: string

    FixRequest:
      type: object
      required: [code, language]
      properties:
        code:
          type: string
        language:
          type: string

    AnalyzeResponse:
      type: object
      properties:
        success:
          type: boolean
        review:
          type: object
          properties:
            id:
              type: string
            file:
              type: string
            language:
              type: string
            score:
              type: integer
            overview:
              type: object
              properties:
                title:
                  type: string
                subtitle:
                  type: string
            stats:
              type: object
              properties:
                lines:
                  type: integer
                issues:
                  type: integer
            issues:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: string
                  line:
                    type: integer
                  title:
                    type: string
                  description:
                    type: string
            refactoring:
              type: array
              items:
                type: string
            docs:
              type: array
              items:
                type: object
                properties:
                  method:
                    type: string
                  path:
                    type: string
                  description:
                    type: string
            snippet:
              type: string
            createdAt:
              type: string
              format: date-time

    FixResponse:
      type: object
      properties:
        success:
          type: boolean
        code:
          type: string

    ReviewHistoryItem:
      type: object
      properties:
        id:
          type: string
        file:
          type: string
        lang:
          type: string
        score:
          type: integer
        snippet:
          type: string
        time:
          type: string
        at:
          type: string
          format: date-time
          nullable: true

    FeatureItem:
      type: object
      properties:
        icon:
          type: string
        title:
          type: string
        text:
          type: string

    LanguageItem:
      type: object
      properties:
        name:
          type: string
        level:
          type: string
        text:
          type: string

    DashboardResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            name:
              type: string
        stats:
          type: array
          items:
            type: object
            properties:
              icon:
                type: string
              value:
                type: string
              label:
                type: string
              delta:
                type: string
        activity:
          type: array
          items:
            type: object
            properties:
              file:
                type: string
              lang:
                type: string
              score:
                type: integer
              time:
                type: string